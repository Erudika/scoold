about.scoold.1 = Scoold \u00e9s una plataforma de f\u00f2rum de codi obert per a la compartici\u00f3 de coneixement i col\u00b7laboraci\u00f3. Est\u00e0 inspirada a StackOverflow.com, els llocs de la fam\u00edlia Stack Exchange, i tenim un gran respecte cap a les persones darrere seu.
about.scoold.2 = Tot tracta de:
about.scoold.3 = aprendre coses noves,
about.scoold.4 = compartir coneixements,
about.scoold.5 = recopilar i organitzar informaci\u00f3,
about.scoold.6 = ajudar els teus companys i guanyar punts de reputaci\u00f3 fent-ho.
about.scoold.7 = La informaci\u00f3 s'organitza al voltant de preguntes. Les preguntes poden ser espec\u00edfiques o una discussi\u00f3 sobre un tema. Sota cada pregunta hi ha les respostes, ordenades per vots. El nombre de vots indica la qualitat tant de les respostes com de les preguntes. Quasi totes les publicacions es poden votar a favor (+) o en contra (-).
about.questions.9 = Per descomptat, sempre pots respondre la teva pr\u00f2pia pregunta si en saps la resposta. Aix\u00ed ajudes els altres i guanyes reputaci\u00f3. Pots fer tantes preguntes com vulguis, per\u00f2 tingues en compte que les preguntes duplicades poden ser votades a la baixa o fins i tot suprimides.
about.questions.10 = Tot el relacionat amb el lloc s'ha de discutir a la secci\u00f3 'Comentaris'. All\u00ed pots publicar totes les preguntes, suggeriments, comentaris generals o peticions de funcions relacionats amb el lloc.
about.questions.11 = Una pregunta pot ser tancada per diversos motius: t\u00e9 massa respostes, \u00e9s un duplicat d'una altra o simplement no \u00e9s adequada. Tancar una pregunta vol dir que no es poden publicar noves respostes, per\u00f2 l'edici\u00f3 es mant\u00e9. Una pregunta es marca autom\u00e0ticament per tancar quan arriba a -5 vots.
about.questions.12 = Tothom amb la ins\u00edgnia 'Professor' pot editar preguntes.
about.answers.1 = Es poden publicar respostes a qualsevol pregunta que encara no estigui tancada. Les respostes bones sempre estan al capdamunt, i una d'elles pot ser aprovada com la millor per l'autor de la pregunta. La resposta aprovada ha de ser la m\u00e9s \u00fatil per a l'autor, no necess\u00e0riament la que t\u00e9 m\u00e9s vots. S'ha d'evitar publicar respostes d'una o dues paraules; aquestes esdevenen comentaris (mira Comentaris).
about.answers.2 = Tothom amb la ins\u00edgnia 'Novell' pot editar respostes.
about.revisions.1 = Cada vegada que edites una pregunta o resposta, es crea una nova revisi\u00f3. Les revisions fan seguiment de tots els canvis en el text, el t\u00edtol i les etiquetes de preguntes i respostes. La primera revisi\u00f3 \u00e9s l'original. La seg\u00fcent edici\u00f3 crea la revisi\u00f3 #1, despr\u00e9s #2, i aix\u00ed successivament.
about.revisions.2 = Sempre pots tornar a l'original o a qualsevol altra revisi\u00f3. Restaurar l'original no suprimeix cap revisi\u00f3 pr\u00e8via, per\u00f2 crea una nova revisi\u00f3 amb el text original restaurat.
about.comments.1 = Es poden publicar comentaris en totes les preguntes i respostes. B\u00e0sicament, tot all\u00f2 massa curt per ser una resposta hauria de ser un comentari. Els comentaris tamb\u00e9 poden contenir suggeriments, correccions o cr\u00edtiques. Els comentaris dolents seran votats a la baixa i amagat autom\u00e0ticament quan arribin a -5 vots.
about.comments.2 = Tothom amb la ins\u00edgnia 'Apasionat' pot publicar comentaris.
about.voterep.1 = La votaci\u00f3 \u00e9s part integral de Scoold. Si t'agrada alguna cosa \u00fatil o interessant, vota a favor. Les preguntes clares i ben escrites tamb\u00e9 han de rebre +1. Igual per respostes \u00fatils. Si alguna cosa est\u00e0 mal redactada, \u00e9s poc clara, grollera o inapropiada, vota en contra.
about.voterep.2 = Els teus punts de reputaci\u00f3 mesuren quina confian\u00e7a i agraden els altres a tu. La reputaci\u00f3 s'obt\u00e9 fent bones preguntes i respostes. Tamb\u00e9 es concedeix amb determinades ins\u00edgnies.
about.voterep.3 = La votaci\u00f3 est\u00e0 vinculada a la reputaci\u00f3. Guanyes punts quan voten a favor les teves publicacions i en perds si alg\u00fa vota en contra. Votar en contra costa 1 punt.
about.voterep.4 = Si la teva resposta rep un vot a favor, guanyes:
about.voterep.5 = Si la teva pregunta rep un vot a favor, guanyes:
about.voterep.6 = Si el teu comentari, comentari o traducci\u00f3 rep un vot a favor, guanyes:
about.voterep.7 = Si la teva resposta \u00e9s aprovada, guanyes:
about.voterep.8 = Si aproves una resposta a la teva pregunta, guanyes:
about.voterep.9 = Si la teva publicaci\u00f3 rep un vot en contra, perds:
about.voterep.10 = Si votes en contra, perds:
about.badges.1 = Les ins\u00edgnies nom\u00e9s es donen als qui les mereixen. Ser amable i respectu\u00f3s sempre et far\u00e0 guanyar ins\u00edgnies i punts de reputaci\u00f3. Aix\u00ed que sigues amable i obt\u00e9 algunes d'aquestes ins\u00edgnies:
about.badges.niceprofile = el teu perfil est\u00e0 complet
about.badges.tester = per a persones que han ajudat a provar el lloc
about.badges.reporter = per cada informe que envieu
about.badges.voter = ha votat m\u00e9s de 100 vegades
about.badges.critic = ha votat en contra 10 vegades
about.badges.supporter = ha votat a favor 50 vegades
about.badges.commentator = ha publicat 100 comentaris
about.badges.editor = ha editat la teva publicaci\u00f3 per primer cop
about.badges.backintime = cada vegada que restaures una publicaci\u00f3 d'una revisi\u00f3
about.badges.noob = has aprovat una resposta a la teva pregunta per primer cop
about.badges.enthusiast = has arribat a 100 punts de reputaci\u00f3
about.badges.freshman = has arribat a 300 punts de reputaci\u00f3
about.badges.scholar = has arribat a 500 punts de reputaci\u00f3
about.badges.teacher = has arribat a 1000 punts de reputaci\u00f3
about.badges.professor = has arribat a 5000 punts de reputaci\u00f3
about.badges.geek = has arribat a 9000 punts de reputaci\u00f3
about.badges.goodquestion = la teva pregunta ha arribat a 20 vots
about.badges.goodanswer = la teva resposta ha arribat a 10 vots
about.badges.eureka = cada vegada que respons la teva pr\u00f2pia pregunta
about.badges.senior = el teu compte t\u00e9 un any
about.badges.disciplined = cada vegada que suprimeixes el teu propi comentari
about.badges.polyglot = cada vegada que aproven la teva traducci\u00f3
about.reports.1 = Si alguna vegada detectes problemes a Scoold, informa'ns! Aix\u00f2 inclou errors, informaci\u00f3 incorrecta o que falta, comportament abusiu, discriminatori o explotador. Cada informe mant\u00e9 Scoold com un lloc agradable i amigable.
about.reports.2 = Aqu\u00ed veur\u00e0s diversos informes d'usuaris sobre problemes del lloc, com spam o comportament abusiu. El sistema tamb\u00e9 generar\u00e0 un informe quan calgui la teva atenci\u00f3.
about.accounts.1 = No necessites registrar un compte a Scoold - nom\u00e9s has d'iniciar sessi\u00f3 amb un compte social. La primera vegada que inicies sessi\u00f3, nom\u00e9s demanarem el teu nom i correu electr\u00f2nic. Prometem protegir el teu correu i no enviar-te res tret del que sigui realment important.
about.feedback.1 = La secci\u00f3 de comentaris \u00e9s on pots dir-nos qu\u00e8 en penses del lloc. Tamb\u00e9 pots fer preguntes sobre el lloc, descriure problemes que hagis trobat o suggerir millores. Si creus que ens falta alguna cosa, ves-hi i explica-ho!

