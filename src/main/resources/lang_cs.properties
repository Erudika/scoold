about.reports.1 = Pokud si v\u0161imnete jak\u00fdchkoliv probl\u00e9m\u016f na Scoold, nahlaste je! Pat\u0159\u00ed sem chyby, chyb\u011bj\u00edc\u00ed nebo nespr\u00e1vn\u00e9 informace, ur\u00e1\u017eliv\u00e9, diskrimina\u010dn\u00ed nebo zneu\u017e\u00edvaj\u00edc\u00ed chov\u00e1n\u00ed. Ka\u017ed\u00e9 va\u0161e hl\u00e1\u0161en\u00ed pom\u00e1h\u00e1 udr\u017eet Scoold p\u0159\u00edjemn\u00fdm a p\u0159\u00e1telsk\u00fdm m\u00edstem.
about.reports.2 = Zde uvid\u00edte r\u016fzn\u00e9 u\u017eivatelsk\u00e9 reporty probl\u00e9m\u016f na webu, jako jsou spamov\u00e9 zpr\u00e1vy nebo nevhodn\u00e9 chov\u00e1n\u00ed. Syst\u00e9m vygeneruje tak\u00e9 report, kdykoliv n\u011bco vy\u017eaduje va\u0161i pozornost.
about.accounts.1 = Na Scoold se nemus\u00edte registrovat \u2013 sta\u010d\u00ed se p\u0159ihl\u00e1sit p\u0159es sv\u016fj soci\u00e1ln\u00ed \u00fa\u010det. Poprv\u00e9 po p\u0159ihl\u00e1\u0161en\u00ed po\u017e\u00e1d\u00e1me pouze o va\u0161e jm\u00e9no a email. Slibujeme, \u017ee v\u00e1\u0161 email bude v bezpe\u010d\u00ed a nedostanete nic, pokud to nebude opravdu d\u016fle\u017eit\u00e9.
about.feedback.1 = Sekce zp\u011btn\u00e9 vazby je m\u00edsto, kde n\u00e1m m\u016f\u017eete \u0159\u00edct, co si o webu mysl\u00edte. M\u016f\u017eete zde tak\u00e9 polo\u017eit jakoukoli ot\u00e1zku k webu, podrobn\u011b popsat probl\u00e9my \u010di navrhnout zlep\u0161en\u00ed. Pokud m\u00e1te pocit, \u017ee tu n\u011bco chyb\u00ed, jd\u011bte tam a \u0159ekn\u011bte n\u00e1m to!

