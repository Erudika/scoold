about.scoold.1 = Scoold je open source f\u00f3rum pro sd\u00edlen\u00ed znalost\u00ed a spolupr\u00e1ci. Inspirovalo se StackOverflow.com a str\u00e1nkami rodiny Stack Exchange a velmi si v\u00e1\u017e\u00edme lid\u00ed za nimi.
about.scoold.2 = Jde o:
about.scoold.3 = u\u010den\u00ed se nov\u00fdm v\u011bcem,
about.scoold.4 = sd\u00edlen\u00ed znalost\u00ed,
about.scoold.5 = shroma\u017e\u010fov\u00e1n\u00ed a organizov\u00e1n\u00ed informac\u00ed,
about.scoold.6 = pom\u00e1h\u00e1n\u00ed va\u0161im koleg\u016fm a z\u00edsk\u00e1v\u00e1n\u00ed reputa\u010dn\u00edch bod\u016f.
about.scoold.7 = Informace jsou organizov\u00e1ny kolem ot\u00e1zek. Ot\u00e1zky mohou b\u00fdt konkr\u00e9tn\u00ed nebo diskuze na ur\u010dit\u00e9 t\u00e9ma. Pod ka\u017edou ot\u00e1zkou jsou odpov\u011bdi se\u0159azen\u00e9 podle hlas\u016f. Po\u010det hlas\u016f ukazuje kvalitu jak ot\u00e1zek, tak odpov\u011bd\u00ed. T\u00e9m\u011b\u0159 ka\u017ed\u00fd p\u0159\u00edsp\u011bvek lze hodnotit kladn\u011b (+) nebo z\u00e1porn\u011b (-).
about.questions.9 = Samoz\u0159ejm\u011b m\u016f\u017eete kdykoli odpov\u011bd\u011bt na svou vlastn\u00ed ot\u00e1zku, pokud zn\u00e1te odpov\u011b\u010f. T\u00edm pom\u00e1h\u00e1te ostatn\u00edm a z\u00e1rove\u0148 z\u00edsk\u00e1te reputa\u010dn\u00ed body. M\u016f\u017eete pokl\u00e1dat kolik ot\u00e1zek chcete, ale pamatujte, \u017ee duplicitn\u00ed ot\u00e1zky mohou b\u00fdt hodnoceny z\u00e1porn\u011b nebo dokonce smaz\u00e1ny.
about.questions.10 = V\u0161e, co se t\u00fdk\u00e1 samotn\u00e9ho webu, by m\u011blo b\u00fdt projedn\u00e1no v sekci 'Zp\u011btn\u00e1 vazba'. Tam m\u016f\u017eete kl\u00e1st ot\u00e1zky k webu, navrhovat zlep\u0161en\u00ed nebo pod\u00e1vat obecn\u00e9 zp\u011btn\u00e9 vazby a po\u017eadavky na funkce.
about.questions.11 = Ot\u00e1zka m\u016f\u017ee b\u00fdt uzav\u0159ena z r\u016fzn\u00fdch d\u016fvod\u016f \u2013 je zde p\u0159\u00edli\u0161 mnoho odpov\u011bd\u00ed, je to duplicita jin\u00e9 ot\u00e1zky, nebo je nevhodn\u00e1. Uzav\u0159en\u00ed ot\u00e1zky znamen\u00e1, \u017ee nelze p\u0159id\u00e1vat nov\u00e9 odpov\u011bdi, ale \u00fapravy jsou st\u00e1le mo\u017en\u00e9. Ot\u00e1zka je automaticky ozna\u010dena k uzav\u0159en\u00ed, kdy\u017e dos\u00e1hne -5 hlas\u016f.
about.questions.12 = Ka\u017ed\u00fd s odznakem 'U\u010ditel' m\u016f\u017ee upravovat ot\u00e1zky.
about.answers.1 = Odpov\u011bdi lze p\u0159id\u00e1vat na v\u0161echny ot\u00e1zky, kter\u00e9 je\u0161t\u011b nejsou uzav\u0159en\u00e9. Dobr\u00e9 odpov\u011bdi jsou v\u017edy naho\u0159e a jedna z nich m\u016f\u017ee b\u00fdt autorem ot\u00e1zky schv\u00e1lena jako nejlep\u0161\u00ed. Schv\u00e1len\u00e1 odpov\u011b\u010f by m\u011bla b\u00fdt nejv\u00edce u\u017eite\u010dn\u00e1 autorovi ot\u00e1zky, ne nutn\u011b s nejvy\u0161\u0161\u00edm po\u010dtem hlas\u016f. Vyhn\u011bte se odpov\u011bd\u00edm dlouh\u00fdm jen jeden nebo dva slova; ty pat\u0159\u00ed do koment\u00e1\u0159\u016f.
about.answers.2 = Ka\u017ed\u00fd s odznakem 'Nov\u00e1\u010dek' m\u016f\u017ee upravovat odpov\u011bdi.
about.revisions.1 = Poka\u017ed\u00e9, kdy\u017e uprav\u00edte ot\u00e1zku nebo odpov\u011b\u010f, vytvo\u0159\u00ed se nov\u00e1 revize. Revize sleduj\u00ed ve\u0161ker\u00e9 zm\u011bny v textu, nadpisu a \u0161t\u00edtc\u00edch ot\u00e1zek a odpov\u011bd\u00ed. Prvn\u00ed revize je origin\u00e1l. Dal\u0161\u00ed \u00fapravy vytvo\u0159\u00ed revizi #1, #2 a tak d\u00e1le.
about.revisions.2 = V\u017edy se m\u016f\u017eete vr\u00e1tit k origin\u00e1lu nebo kter\u00e9koliv jin\u00e9 revizi. Obnoven\u00ed origin\u00e1lu nevyma\u017ee p\u0159edchoz\u00ed revize, ale vytvo\u0159\u00ed novou revizi s obnoven\u00fdm origin\u00e1ln\u00edm textem.
about.comments.1 = Koment\u00e1\u0159e lze p\u0159id\u00e1vat ke v\u0161em ot\u00e1zk\u00e1m i odpov\u011bd\u00edm. V podstat\u011b v\u0161e, co je na odpov\u011b\u010f p\u0159\u00edli\u0161 kr\u00e1tk\u00e9, by m\u011blo b\u00fdt koment\u00e1\u0159em. Koment\u00e1\u0159e mohou obsahovat tak\u00e9 n\u00e1vrhy, opravy \u010di kritiku. \u0160patn\u00e9 koment\u00e1\u0159e jsou hodnoceny z\u00e1porn\u011b a automaticky skryty, pokud dos\u00e1hnou -5 hlas\u016f.
about.comments.2 = Ka\u017ed\u00fd s odznakem 'Nad\u0161enec' m\u016f\u017ee p\u0159id\u00e1vat koment\u00e1\u0159e.
about.voterep.1 = Hlasov\u00e1n\u00ed je ned\u00edlnou sou\u010d\u00e1st\u00ed Scoold. Pokud se v\u00e1m n\u011bco l\u00edb\u00ed nebo je u\u017eite\u010dn\u00e9, ohodno\u0165te kladn\u011b. Ot\u00e1zky, kter\u00e9 jsou jasn\u00e9 a dob\u0159e napsan\u00e9, by m\u011bly b\u00fdt tak\u00e9 ohodnoceny +1. Tot\u00e9\u017e plat\u00ed pro u\u017eite\u010dn\u00e9 odpov\u011bdi. Pokud je n\u011bco naps\u00e1no \u0161patn\u011b, nejasn\u011b, je hrub\u00e9 nebo nevhodn\u00e9, ohodno\u0165te z\u00e1porn\u011b.
about.voterep.2 = Va\u0161e reputa\u010dn\u00ed body m\u011b\u0159\u00ed, kolik lid\u00ed v\u00e1m d\u016fv\u011b\u0159uje a m\u00e1 v\u00e1s r\u00e1do. Reputaci z\u00edsk\u00e1v\u00e1te za kvalitn\u00ed ot\u00e1zky a odpov\u011bdi. Ud\u011bluj\u00ed se tak\u00e9 spolu s ur\u010dit\u00fdmi odznaky.
about.voterep.3 = Hlasov\u00e1n\u00ed je spojen\u00e9 s reputac\u00ed. Z\u00edsk\u00e1te body reputace, kdy\u017e p\u0159\u00edsp\u011bvek dostane kladn\u00fd hlas, a ztrat\u00edte je, kdy\u017e dostane z\u00e1porn\u00fd hlas. Za hlasov\u00e1n\u00ed z\u00e1porn\u011b ztr\u00e1c\u00edte 1 bod reputace.
