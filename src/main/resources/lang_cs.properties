about.badges.1 = Odznaky jsou ud\u011blov\u00e1ny pouze t\u011bm, kte\u0159\u00ed si je zaslou\u017e\u00ed. B\u00fdt p\u0159\u00e1telsk\u00fd a slu\u0161n\u00fd v\u00e1m v\u017edy p\u0159inese odznaky a body reputace. Bu\u010fte tedy hodn\u00ed a z\u00edsk\u00e1vejte tyto odznaky:
