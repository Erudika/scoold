about.badges.commentator = ke postuar 100 komente
about.badges.editor = ke redaktuar postimin t\u00ebnd p\u00ebr her\u00eb t\u00eb par\u00eb
about.badges.backintime = sa her\u00eb rikthen nj\u00eb postim nga rishikimi
about.badges.noob = pranoi p\u00ebrgjigjen p\u00ebr pyetjen t\u00ebnde p\u00ebr her\u00eb t\u00eb par\u00eb
about.badges.enthusiast = arriti 100 pik\u00eb reputacioni
about.badges.freshman = arriti 300 pik\u00eb reputacioni
