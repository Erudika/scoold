about.badges.professor = arriti 5000 pik\u00eb reputacioni
about.badges.geek = arriti 9000 pik\u00eb reputacioni
about.badges.goodquestion = pyetja jote mori 20 vota
about.badges.goodanswer = p\u00ebrgjigja jote mori 10 vota
about.badges.eureka = sa her\u00eb p\u00ebrgjigjesh n\u00eb pyetjen t\u00ebnde
about.badges.senior = llogaria jote \u00ebsht\u00eb nj\u00eb vit e vjet\u00ebr
about.badges.disciplined = sa her\u00eb fshin komentet e tua
about.badges.polyglot = sa her\u00eb p\u00ebrkthimet e tua aprovohen
about.reports.1 = N\u00ebse v\u00ebren ndonj\u00eb problem n\u00eb Scoold, raporto! P\u00ebrfshin gabimet, munges\u00ebn ose informacionin e pasakt\u00eb, sjellje abuzive, diskriminuese ose shfryt\u00ebzuese. \u00c7do raport ndihmon ta mbajm\u00eb Scoold vend t\u00eb mir\u00eb dhe mikprit\u00ebs.
about.reports.2 = K\u00ebtu do t\u00eb shihni raporte t\u00eb ndryshme p\u00ebrdoruesish p\u00ebr probleme n\u00eb site, si raportet p\u00ebr spam ose sjellje abuzive. Sistemi do t\u00eb gjeneroj\u00eb nj\u00eb raport sa her\u00eb di\u00e7ka k\u00ebrkon v\u00ebmendjen tuaj.
about.accounts.1 = Nuk keni nevoj\u00eb t\u00eb regjistroheni p\u00ebr nj\u00eb llogari n\u00eb Scoold \u2014 mjafton t\u00eb hyni me llogarin\u00eb sociale. Her\u00ebn e par\u00eb q\u00eb hyni, k\u00ebrkojm\u00eb vet\u00ebm emrin dhe emailin. Premtojm\u00eb q\u00eb do ta mbajm\u00eb emailin tuaj t\u00eb sigurt dhe nuk do t'ju d\u00ebrgojm\u00eb gj\u00ebra, p\u00ebrve\u00e7se n\u00eb raste t\u00eb r\u00ebnd\u00ebsishme.
about.feedback.1 = Seksioni i komenteve \u00ebsht\u00eb vendi ku mund t\u00eb na thoni \u00e7far\u00eb mendoni p\u00ebr faqen. Mund t\u00eb pyesni gjithashtu p\u00ebr faqen, t\u00eb p\u00ebrshkruani problemet q\u00eb keni hasur ose t\u00eb sugjeroni p\u00ebrmir\u00ebsime. N\u00ebse mendoni se ka di\u00e7ka q\u00eb kemi l\u00ebn\u00eb jasht\u00eb, shkoni atje dhe na tregoni tani!

