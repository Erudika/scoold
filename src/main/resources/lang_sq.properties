about.scoold.1 = Scoold \u00ebsht\u00eb nj\u00eb platform\u00eb forumesh me burim t\u00eb hapur p\u00ebr ndarjen e dijes dhe bashk\u00ebpunimin. \u00cbsht\u00eb frym\u00ebzuar nga StackOverflow.com dhe faqet e familjes Stack Exchange dhe kemi respekt t\u00eb madh p\u00ebr njer\u00ebzit pas tyre.
about.scoold.2 = \u00cbsht\u00eb krejt p\u00ebr:
about.scoold.3 = t\u00eb m\u00ebsuarit gj\u00ebra t\u00eb reja,
about.scoold.4 = ndarjen e njohurive,
about.scoold.5 = mbledhjen dhe organizimin e informacionit,
about.scoold.6 = ndihm\u00ebn p\u00ebr skuadr\u00ebn tuaj dhe fitimin e pik\u00ebve reputacioni gjat\u00eb k\u00ebsaj.
about.scoold.7 = Informacioni organizohet rreth pyetjeve. Pyetjet mund t\u00eb jen\u00eb specifike ose form\u00eb diskutimi mbi nj\u00eb tem\u00eb t\u00eb caktuar. Posht\u00eb \u00e7do pyetjeje jan\u00eb p\u00ebrgjigjet t\u00eb renditura sipas votave. Numri i votave tregon cil\u00ebsin\u00eb e p\u00ebrgjigjeve dhe pyetjeve. \u00c7do postim mund t\u00eb votohet me + ose -.
about.questions.9 = Sigurisht, mund t\u00eb p\u00ebrgjigjeni pyetjes suaj n\u00ebse e dini p\u00ebrgjigjen. K\u00ebshtu ndihmoni t\u00eb tjer\u00ebt dhe fitoni reputacion. Mund t\u00eb b\u00ebni sa pyetje t\u00eb doni, por kini parasysh q\u00eb pyetjet e p\u00ebrs\u00ebritura mund t\u00eb votojn\u00eb posht\u00eb ose t\u00eb fshihen.
about.questions.10 = Gjith\u00e7ka lidhet me faqen duhet diskutuar n\u00eb seksionin 'Komentet'. Aty mund t\u00eb postoni pyetje, sugjerime, komente t\u00eb p\u00ebrgjithshme ose k\u00ebrkesa p\u00ebr ve\u00e7ori.
about.questions.11 = Nj\u00eb pyetje mund t\u00eb mbyllet p\u00ebr arsyet e ndryshme \u2014 ka shum\u00eb p\u00ebrgjigje, \u00ebsht\u00eb e p\u00ebrs\u00ebritur ose \u00ebsht\u00eb e pap\u00ebrshtatshme. Mbyllja e pyetjes do t\u00eb thot\u00eb se nuk mund t\u00eb shtohen p\u00ebrgjigje t\u00eb reja, por mund t\u00eb redaktohet. Pyetja sh\u00ebnohet automatikisht p\u00ebr mbyllje kur arrin -5 vota.
about.questions.12 = Kushdo me medaljen 'M\u00ebsues' mund t\u00eb redaktoj\u00eb pyetjet.
about.answers.1 = P\u00ebrgjigjet mund t\u00eb postohen p\u00ebr \u00e7do pyetje q\u00eb nuk \u00ebsht\u00eb e mbyllur. P\u00ebrgjigjet e mira jan\u00eb gjithmon\u00eb n\u00eb krye dhe nj\u00eb prej tyre mund t\u00eb aprovohet si m\u00eb e mira nga autori i pyetjes. P\u00ebrgjigjja e aprovuar duhet t\u00eb jet\u00eb ajo q\u00eb i ndihmon m\u00eb shum\u00eb autorit dhe jo ajo me m\u00eb shum\u00eb vota. Duhet t\u00eb shmangni p\u00ebrgjigjet nj\u00eb ose dy fjal\u00ebsh; ato duhet t\u00eb jen\u00eb komente (shih Komentet).
about.answers.2 = Kushdo me medaljen 'Fillestar' mund t\u00eb redaktoj\u00eb p\u00ebrgjigjet.
about.revisions.1 = Sa her\u00eb redaktoni pyetje ose p\u00ebrgjigje, krijohet nj\u00eb rishikim i ri. Rishikimet ruajn\u00eb t\u00eb gjitha ndryshimet n\u00eb tekst, titull dhe etiketa. Rishikimi i par\u00eb \u00ebsht\u00eb origjinali. Redaktimi tjet\u00ebr krijon rishikimin #1, pastaj #2 etj.
about.revisions.2 = Mund t\u00eb ktheheni gjithmon\u00eb te origjinali ose ndonj\u00eb rishikim tjet\u00ebr. Rikthimi tek origjinali nuk fshin rishikimet e m\u00ebparshme, por krijon nj\u00eb rishikim t\u00eb ri me tekstin origjinal.
about.comments.1 = Komentet mund t\u00eb postohen mbi t\u00eb gjitha pyetjet dhe p\u00ebrgjigjet. \u00c7do gj\u00eb q\u00eb \u00ebsht\u00eb shum\u00eb e shkurt\u00ebr p\u00ebr nj\u00eb p\u00ebrgjigje duhet t\u00eb jet\u00eb koment. Komentet mund p\u00ebrmbajn\u00eb sugjerime, korrigjime ose kritika. Komentet e k\u00ebqija do t\u00eb votohet posht\u00eb dhe do t\u00eb fshihen automatikisht kur arrijn\u00eb -5 vota.
about.comments.2 = Kushdo me medaljen 'Entuziast' mund t\u00eb postoj\u00eb komente.
about.voterep.1 = Votimi \u00ebsht\u00eb pjes\u00eb integrale e Scoold. N\u00ebse di\u00e7ka ju duket e dobishme, votoni pozitiv. Pyetjet e qarta dhe t\u00eb shkruara mir\u00eb duhet gjithashtu t\u00eb marrin +1. I nj\u00ebjti vlen p\u00ebr p\u00ebrgjigjet e dobishme. N\u00ebse di\u00e7ka \u00ebsht\u00eb shkruar keq, paqart\u00eb, e pasjellshme ose e pap\u00ebrshtatshme, votoni negativ.
about.voterep.2 = Pikat tuaja t\u00eb reputacionit matin sa tjer\u00ebt ju besojn\u00eb dhe ju p\u00eblqejn\u00eb. Fitohen duke postuar pyetje dhe p\u00ebrgjigje t\u00eb mira. Gjithashtu jepen me medalje t\u00eb caktuara.
about.voterep.3 = Votimi lidhet me reputacionin. Fitoni pikat kur postimi juaj voton pozitiv dhe humbni pik\u00eb kur votohen negativisht. Votimi negativ kushton 1 pik\u00eb reputacioni.
about.voterep.4 = N\u00ebse p\u00ebrgjigjja juaj votohet pozitivisht, fitoni:
about.voterep.5 = N\u00ebse pyetja juaj votohet pozitivisht, fitoni:
about.voterep.6 = N\u00ebse komentet, komentet apo p\u00ebrkthimet votohet pozitivisht, fitoni:
about.voterep.7 = N\u00ebse p\u00ebrgjigjja juaj aprovohet, fitoni:
about.voterep.8 = N\u00ebse aprovoni nj\u00eb p\u00ebrgjigje p\u00ebr pyetjen tuaj, fitoni:
about.voterep.9 = N\u00ebse postimi juaj votohet negativisht, humbni:
about.voterep.10 = N\u00ebse votoni negativisht di\u00e7ka, humbni:
about.badges.1 = Medaljet jepen vet\u00ebm atyre q\u00eb i meritojn\u00eb. Sjellja e mir\u00eb dhe respekti ndaj t\u00eb tjer\u00ebve gjithmon\u00eb sjell medalje dhe pik\u00eb reputacioni. B\u00ebhu i mir\u00eb dhe fitom\u00eb disa prej k\u00ebtyre medaljeve:
about.badges.niceprofile = profili yt \u00ebsht\u00eb i kompletuar
about.badges.tester = p\u00ebr njer\u00ebzit q\u00eb ndihmuan n\u00eb testimin e faqes
about.badges.reporter = p\u00ebr \u00e7do raport q\u00eb d\u00ebrgon
about.badges.voter = ke votuar m\u00eb shum\u00eb se 100 her\u00eb
about.badges.critic = ke votuar negativ m\u00eb shum\u00eb se 10 her\u00eb
