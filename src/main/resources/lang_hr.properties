about.scoold.1 = Scoold je open source forum platforma za dijeljenje znanja i suradnju. Inspirirana je StackOverflow.com i sajtovima iz Stack Exchange obitelji, prema kojima imamo veliko po\u0161tovanje.
about.scoold.2 = Sve se svodi na:
about.scoold.3 = u\u010denje novih stvari,
about.scoold.4 = dijeljenje znanja,
about.scoold.5 = prikupljanje i organiziranje informacija,
about.scoold.6 = pomaganje kolegama i stjecanje bodova reputacije dok to radite.
about.scoold.7 = Informacije su organizirane oko pitanja. Pitanja mogu biti specifi\u010dna ili u obliku rasprave o odre\u0111enoj temi. Ispod svakog pitanja nalaze se odgovori koji su sortirani po glasovima. Broj glasova pokazuje kvalitetu odgovora i pitanja. Gotovo svaki post mo\u017ee se glasati gore (+) ili dolje (-).
about.questions.9 = Naravno, uvijek mo\u017eete odgovoriti na svoje vlastito pitanje ako znate odgovor. Time poma\u017eete drugima i tako\u0111er \u0107ete zaraditi reputacijske bodove. Mo\u017eete postavljati koliko god pitanja \u017eelite, ali imajte na umu da duplicate mogu biti ocijenjeni negativno ili \u010dak izbrisani.
about.questions.10 = Sve \u0161to se ti\u010de same web stranice treba raspravljati u odjeljku "Povratne informacije". Tamo mo\u017eete postavljati pitanja o stranici, prijedloge, op\u0107e povratne informacije ili zahtjeve za dodavanje funkcionalnosti.
about.questions.11 = Pitanje mo\u017ee biti zatvoreno iz raznih razloga \u2014 ima previ\u0161e odgovora, duplikat je drugog pitanja ili je neprikladno. Zatvaranje pitanja zna\u010di da se vi\u0161e ne mogu postavljati novi odgovori, ali ure\u0111ivanje je i dalje mogu\u0107e. Pitanje se automatski ozna\u010dava za zatvaranje kad dosegne -5 glasova.
about.questions.12 = Svatko s bed\u017eem "Teacher" mo\u017ee ure\u0111ivati pitanja.
about.answers.1 = Odgovori se mogu postavljati na svako pitanje koje jo\u0161 nije zatvoreno. Dobri odgovori su uvijek na vrhu i jedan od njih mo\u017ee biti prihva\u0107en kao najbolji od strane autora pitanja. Prihva\u0107eni odgovor treba biti onaj koji je najkorisniji autoru, a ne onaj s najvi\u0161e glasova. Trebali biste izbjegavati postavljanje odgovora koji su jedan ili dva zbaka duga\u010dki. Takvi odgovori trebaju biti komentari (vidi Komentare).
about.answers.2 = Svatko s bed\u017eem "Freshman" mo\u017ee ure\u0111ivati odgovore.
about.revisions.1 = Svaki put kada uredite pitanje ili odgovor, kreira se nova revizija. Revizije prate sve promjene u tekstu, naslovu i oznakama pitanja i odgovora. Prva revizija je original. Sljede\u0107e ure\u0111ivanje kreira reviziju #1, potom #2 i tako dalje.
about.revisions.2 = Uvijek se mo\u017eete vratiti na original ili neku od ostalih revizija. Vra\u0107anje na original ne bri\u0161e prethodne revizije nego stvara novu reviziju s povr\u0107enom izvornom tekstom.
about.comments.1 = Komentari se mogu postavljati na svim pitanjima i odgovorima. U biti, sve \u0161to je prekratko za odgovor treba biti komentar. Komentari mogu sadr\u017eavati prijedloge, ispravke ili kritike. Lo\u0161i komentari se glasaju dolje i automatski sakrivaju kad dosegnu -5 glasova.
about.comments.2 = Svatko s bed\u017eem "Entuzijast" mo\u017ee postavljati komentare.
about.voterep.1 = Glasanje je neizostavan dio Scoold-a. Ako vam se ne\u0161to korisno ili zanimljivo svi\u0111a, glasajte za. Za pitanja koja su jasna i dobro napisana tako\u0111er treba dati +1. Isto vrijedi za korisne odgovore. Ako je ne\u0161to lo\u0161e napisano, nejasno, nepristojno ili neprikladno, glasajte protiv.
about.voterep.2 = Va\u0161i bodovi reputacije mjere koliko vam drugi vjeruju i koliko ih volite. Reputacija se stje\u010de postavljanjem dobrih pitanja i odgovora. Tako\u0111er se nagra\u0111uje odre\u0111enim bed\u017eevima.
about.voterep.3 = Glasanje je povezano s reputacijom. Dobivate bodove kada va\u0161i postovi dobiju glas gore i gubite bodove ako dobiju glas dolje. Glasanje protiv ko\u0161ta 1 bod reputacije.
about.voterep.4 = Ako va\u0161 odgovor dobije glas gore dobijate:
about.voterep.5 = Ako va\u0161e pitanje dobije glas gore dobijate:
about.voterep.6 = Ako va\u0161 komentar, povratna informacija ili prijevod dobiju glas gore dobijate:
about.voterep.7 = Ako je va\u0161 odgovor prihva\u0107en dobijate:
about.voterep.8 = Ako prihvatite odgovor na svoje pitanje dobijate:
about.voterep.9 = Ako va\u0161 post dobije glas dolje gubite:
about.voterep.10 = Ako glasate protiv gubite:
about.badges.1 = Bed\u017eeve dobivaju oni koji ih zaslu\u017euju. Biti ljubazan i s po\u0161tovanjem prema drugima uvijek \u0107e vam donijeti bed\u017eeve i bodove reputacije. Budite ljubazni i osvojite neke od ovih bed\u017eeva:
about.badges.niceprofile = va\u0161 profil je kompletan
about.badges.tester = za osobe koje su pomogle testirati stranicu
about.badges.reporter = za svaku poslane prijave
about.badges.voter = glasao vi\u0161e od 100 puta
about.badges.critic = glasao protiv 10 puta
about.badges.supporter = glasao za 50 puta
about.badges.commentator = napisao 100 komentara
about.badges.editor = prvi put uredio svoj post
about.badges.backintime = svaki put kada vratite post iz revizije
about.badges.noob = prvi put prihvatio odgovor na svoje pitanje
about.badges.enthusiast = dosegao 100 bodova reputacije
about.badges.freshman = dosegao 300 bodova reputacije
about.badges.scholar = dosegao 500 bodova reputacije
about.badges.teacher = dosegao 1000 bodova reputacije
about.badges.professor = dosegao 5000 bodova reputacije
about.badges.geek = dosegao 9000 bodova reputacije
about.badges.goodquestion = va\u0161e pitanje ima 20 glasova
about.badges.goodanswer = va\u0161 odgovor ima 10 glasova
about.badges.eureka = svaki put kada odgovorite na svoje pitanje
about.badges.senior = va\u0161 ra\u010dun je star godinu dana
about.badges.disciplined = svaki put kada izbri\u0161ete svoj komentar
about.badges.polyglot = svaki put kada je va\u0161 prijevod odobren
about.reports.1 = Ako primijetite probleme na Scooldu, prijavite ih! To uklju\u010duje bugove, nedostaju\u0107e ili neto\u010dne informacije, zlostavljanje, diskriminaciju ili iskori\u0161tavanje. Svaka prijava poma\u017ee da Scoold bude ugodno i prijateljsko mjesto.
about.reports.2 = Ovdje \u0107ete vidjeti razne korisni\u010dke prijave za probleme, poput spam prijava ili zlostavlja\u010dkog pona\u0161anja. Sustav \u0107e tako\u0111er generirati izvje\u0161taj kad ne\u0161to zahtijeva va\u0161u pa\u017enju.
about.accounts.1 = Ne morate se registrirati na Scoold \u2014 jednostavno se prijavite putem svog dru\u0161tvenog ra\u010duna. Prvi put kad se prijavite tra\u017eimo samo va\u0161e ime i email adresu. Obvezujemo se \u010duvati va\u0161 email sigurno i ne\u0107emo vam slati ni\u0161ta osim najva\u017enijih stvari.
about.feedback.1 = Odjeljak za povratne informacije je mjesto gdje nam mo\u017eete re\u0107i \u0161to mislite o stranici. Tako\u0111er mo\u017eete pitati sve \u0161to vas zanima o stranici, opisati probleme ili predlo\u017eiti pobolj\u0161anja. Ako mislite da ne\u0161to nedostaje, tu nam to mo\u017eete re\u0107i!

